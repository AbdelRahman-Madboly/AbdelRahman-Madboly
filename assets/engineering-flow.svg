<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="190" viewBox="0 0 1000 190" role="img" aria-labelledby="title desc">
<title id="title">End-to-end engineering workflow</title><desc id="desc">Animated flow from research to production.</desc>
<defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#071a2b"/><stop offset=".52" stop-color="#0b3445"/><stop offset="1" stop-color="#071a2b"/></linearGradient><linearGradient id="line"><stop stop-color="#4dabf7"/><stop offset=".5" stop-color="#22b8cf"/><stop offset="1" stop-color="#63e6be"/></linearGradient><filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect width="1000" height="190" rx="24" fill="url(#bg)"/><text x="500" y="36" text-anchor="middle" fill="#dceef5" font-family="Inter,Segoe UI,sans-serif" font-size="16" font-weight="600" letter-spacing="2">FROM DISCOVERY TO RELIABLE DELIVERY</text>
<path d="M90 101H910" stroke="#174c60" stroke-width="5" stroke-linecap="round"/><path d="M90 101H910" stroke="url(#line)" stroke-width="3" stroke-linecap="round" stroke-dasharray="15 18"><animate attributeName="stroke-dashoffset" from="66" to="0" dur="2.4s" repeatCount="indefinite"/></path>
<g font-family="Inter,Segoe UI,sans-serif" text-anchor="middle" fill="#dceef5" font-size="14" font-weight="600">
<g transform="translate(90 101)"><circle r="17" fill="#0b2638" stroke="#4dabf7" stroke-width="3"/><circle r="6" fill="#4dabf7" filter="url(#glow)"><animate attributeName="r" values="5;8;5" dur="1.8s" repeatCount="indefinite"/></circle><text y="48">Research</text></g>
<g transform="translate(254 101)"><circle r="17" fill="#0b2638" stroke="#3bc9db" stroke-width="3"/><circle r="6" fill="#3bc9db" filter="url(#glow)"><animate attributeName="r" values="5;8;5" dur="1.8s" begin=".3s" repeatCount="indefinite"/></circle><text y="48">Architecture</text></g>
<g transform="translate(418 101)"><circle r="17" fill="#0b2638" stroke="#22b8cf" stroke-width="3"/><circle r="6" fill="#22b8cf" filter="url(#glow)"><animate attributeName="r" values="5;8;5" dur="1.8s" begin=".6s" repeatCount="indefinite"/></circle><text y="48">Backend</text></g>
<g transform="translate(582 101)"><circle r="17" fill="#0b2638" stroke="#20c997" stroke-width="3"/><circle r="6" fill="#20c997" filter="url(#glow)"><animate attributeName="r" values="5;8;5" dur="1.8s" begin=".9s" repeatCount="indefinite"/></circle><text y="48">AI / ML</text></g>
<g transform="translate(746 101)"><circle r="17" fill="#0b2638" stroke="#38d9a9" stroke-width="3"/><circle r="6" fill="#38d9a9" filter="url(#glow)"><animate attributeName="r" values="5;8;5" dur="1.8s" begin="1.2s" repeatCount="indefinite"/></circle><text y="48">Infrastructure</text></g>
<g transform="translate(910 101)"><circle r="17" fill="#0b2638" stroke="#63e6be" stroke-width="3"/><circle r="6" fill="#63e6be" filter="url(#glow)"><animate attributeName="r" values="5;8;5" dur="1.8s" begin="1.5s" repeatCount="indefinite"/></circle><text y="48">Production</text></g></g></svg>
