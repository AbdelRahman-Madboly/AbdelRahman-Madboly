<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="245" viewBox="0 0 1000 245" role="img" aria-labelledby="title desc">
  <title id="title">Engineering advice from Abdel Rahman Madboly</title>
  <desc id="desc">Build the smallest system that can be observed, recovered, and trusted. Clever code wins demos; reliable systems win users.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a2b"/>
      <stop offset="0.55" stop-color="#0b3445"/>
      <stop offset="1" stop-color="#073b3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#4dabf7"/>
      <stop offset="0.52" stop-color="#22b8cf"/>
      <stop offset="1" stop-color="#63e6be"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="245" rx="28" fill="url(#background)"/>
  <rect x="1" y="1" width="998" height="243" rx="27" fill="none" stroke="#17657a" stroke-opacity="0.75"/>

  <text x="64" y="83" fill="#22b8cf" opacity="0.7" font-family="Georgia,serif" font-size="78">“</text>
  <circle cx="914" cy="53" r="7" fill="#63e6be" filter="url(#glow)">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <text x="500" y="90" text-anchor="middle" fill="#e6f7fb" font-family="Inter,Segoe UI,sans-serif" font-size="23" font-weight="650">
    Build the smallest system that can be
  </text>
  <text x="500" y="124" text-anchor="middle" fill="#e6f7fb" font-family="Inter,Segoe UI,sans-serif" font-size="23" font-weight="650">
    observed, recovered, and trusted.
  </text>
  <text x="500" y="166" text-anchor="middle" fill="#8fd3e0" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="550">
    Clever code wins demos. Reliable systems win users.
  </text>

  <rect x="250" y="195" width="500" height="3" rx="2" fill="#174c60"/>
  <rect x="250" y="195" width="500" height="3" rx="2" fill="url(#accent)">
    <animate attributeName="x" values="250;650;250" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="width" values="100;100;100" dur="5s" repeatCount="indefinite"/>
  </rect>
  <text x="500" y="225" text-anchor="middle" fill="#63e6be" font-family="Inter,Segoe UI,sans-serif" font-size="12" font-weight="700" letter-spacing="2">ABDEL RAHMAN MADBOLY · ENGINEERING PRINCIPLE</text>
</svg>
